
# READING_ORDER_PROMPT: |
#   You are a document layout analyst.

#   You will receive:
#   1. A full page image from a PDF
#   2. A list of detected blocks with their bounding boxes and labels

#   Return only a JSON array with this format:
#   {
#     "order": <int>,
#     "idx": <int>,
#     "label": <str>,
#     "bbox": [x1, y1, x2, y2],
#     "role": <str>,
#     "note": <str>
#   }

#   Rules:
#   - For multi-column layouts, read left column first then right column.
#   - Captions should appear immediately after the element they describe.
#   - Mark page numbers, headers, footers, watermarks as role="skip".
#   - Do not include any text outside the JSON array.



READING_ORDER_PROMPT: |
  You are a document layout analyst.

  Input:
  1. A full-page image from a PDF page
  2. A list of detected blocks, each with:
     - idx
     - label
     - bbox = [x1, y1, x2, y2]

  Task:
  Determine the correct human reading order AND assign a precise semantic role to each block.

  Return ONLY a JSON array with this exact schema:
  {
    "order": <int>,
    "idx": <int>,
    "label": <str>,
    "bbox": [x1, y1, x2, y2],
    "role": <str>,
    "note": <str>
  }

  -------------------------
  READING ORDER RULES (STRICT)
  -------------------------
  - Follow natural human reading order, not raw bbox sorting.
  - Single-column: top to bottom.
  - Multi-column: read the entire left column first, then move to the right column.
  - Detect logical reading regions using alignment, spacing, and grouping.
  - Preserve semantic flow:
    - section title → paragraph
    - header → section content
    - list header → list items
  - Captions must be ordered adjacent to their parent figure/table.
  - If the caption bbox is ABOVE the figure: place caption first, then figure.
  - If BELOW: place figure first, then caption.
  - Footnotes appear after main body content.
  - If ambiguous:
    1. Prefer same-column continuation
    2. Prefer vertical proximity within the same region
    3. Prefer semantic grouping over geometric position
  - If any label given is clearly incorrect (e.g., "table" label on a figure), ignore the label and classify based on content.

  -------------------------
  ROLE CLASSIFICATION
  -------------------------
  Assign the most appropriate role:

  Text roles:
  - "title"
  - "body"
  - "caption"
  - "formula"
  - "list_item"
  - "section_header"
  - "footnote"

  Structural roles:
  - "table"

  Visual roles (use most specific possible):
  - "bar_chart"
  - "line_chart"
  - "scatter_plot"
  - "pie_chart"
  - "histogram"
  - "heatmap"
  - "flowchart"
  - "diagram"
  - "map"
  - "photo"
  - "illustration"
  - "plot" (fallback if chart type unclear)
  - "figure" (last fallback)

  Non-content:
  - "header"
  - "footer"
  - "page_number"
  - "watermark"
  - "skip"

  -------------------------
  CLASSIFICATION RULES
  -------------------------
  - Prefer specific chart types over generic:
    pie_chart > bar_chart > line_chart > plot > figure
  - Tables (rows/columns) → "table", NOT figure
  - Equations → "formula"
  - Text describing visuals → "caption"
  - If unsure:
    specific → plot → diagram → figure

  -------------------------
  SKIP RULES
  -------------------------
  Mark these as role="skip":
  - page numbers
  - headers/footers (if repetitive)
  - watermarks
  - decorative elements

  -------------------------
  NOTE FIELD
  -------------------------
  Keep it short and precise.
  Explain:
  - why the role was assigned OR
  - why the order placement was chosen (e.g., "left column continuation", "caption under chart")

  -------------------------
  OUTPUT CONSTRAINTS
  -------------------------
  - Output ONLY the JSON array
  - No markdown
  - No explanations
  - No extra text



MARKDOWN_PROMPT: |
  You are converting a PDF page into clean Markdown.

  You will receive:
  1. The full page image
  2. A reading order JSON
  3. Cropped images of each block in that order

  Rules:
  - Follow the reading order exactly.
  - Use #, ##, ### for headings.
  - Render tables as Markdown tables.
  - For figures and charts, write [Figure: <description>].
  - Skip items with role="skip".
  - Do not hallucinate. Only transcribe visible text.

  After the Markdown, append a fenced ```json block with an array of all figures and tables on the page.
  If there are none, return ```json\n[]\n```.




FIGURE_PROMPTS:
 
  bar_chart: |
    This crop shows a bar chart.

    Provide a highly detailed and exhaustive description covering:
      - The full title of the chart (if present)
      - The x-axis and y-axis labels, including units, scales, and formatting (linear/log, intervals, etc.)
      - All categories or groups shown on the x-axis, including ordering and grouping structure
      - Exact values for each bar, including annotations if visible
      - Color coding, legends, and what each color represents
      - Any patterns such as trends, comparisons, clusters, or anomalies
      - Presence of stacked/grouped bars and their internal composition
      - Any gridlines, reference lines, error bars, or data labels
      - Any textual annotations, footnotes, or callouts
      - The overall message, interpretation, or conclusion conveyed by the chart
    Ensure that every visible element is described and interpreted in detail.
 
  line_chart: |
    This crop shows a line chart.

    Provide a highly detailed and exhaustive description covering:
      - The chart title and any subtitles
      - The x-axis and y-axis labels, including units, time ranges, and scale types
      - The number of lines/series and what each represents (from legend or labels)
      - The color, style (dashed/solid), and markers used for each line
      - Exact values at key points along each line
      - Trends over time (increasing, decreasing, cyclical, flat, volatile)
      - Key inflection points, peaks, troughs, turning points, and crossovers
      - Any intersections between lines and their significance
      - Presence of annotations, highlights, or callouts
      - Gridlines, baselines, or reference thresholds
      - Any missing data, gaps, or irregular intervals
      - The overall pattern and insights conveyed by the chart
    Describe all visible details and interpret their significance thoroughly.
 
  scatter_plot: |
    This crop shows a scatter plot.

    Provide a highly detailed and exhaustive description covering:
      - The title and any descriptive text
      - The x-axis and y-axis labels, including units and scales
      - The distribution of data points across the plot
      - The type of correlation (positive, negative, none, nonlinear) and its strength
      - Clusters or groupings of points and their possible meaning
      - Any visible patterns such as trends, curves, or density variations
      - Color coding, shapes, or sizes of markers and what they represent
      - Presence of regression lines, trend lines, or confidence intervals
      - Any annotations, labels, or highlighted regions
      - The spread and variability of the data
      - The key relationships or insights conveyed
    Ensure every visual and statistical detail is described.
 
  pie_chart: |
    This crop shows a pie chart.

    Provide a highly detailed and exhaustive description covering:
      - The overall subject or total represented by the pie
      - All segments/slices and their labels
      - Exact percentage or value of each slice
      - The largest, smallest, and similarly sized segments
      - Color coding and legend explanations
      - Labels inside or outside slices and any formatting details
      - Ordering and arrangement of slices (clockwise, starting point)
      - Any exploded slices or emphasis effects
      - Presence of annotations, callouts, or additional text
      - Comparisons between segments and dominance patterns
      - Any missing or aggregated categories (e.g., “Other”)
      - The overall composition and key takeaway
    Describe every visible slice and detail without omission.
 
  histogram: |
    This crop shows a histogram.

    Provide a highly detailed and exhaustive description covering:
      - The title and description of the dataset
      - The x-axis variable, including units and bin ranges
      - The y-axis (frequency, count, density) and its scale
      - The number and width of bins
      - The distribution shape (normal, skewed left/right, bimodal, multimodal, uniform)
      - The range of the data (minimum to maximum)
      - Presence of gaps, sparse regions, or empty bins
      - Axis ticks, labels, and gridlines
      - The spread, central tendency, and variability
      - The key insights about the data distribution
    Ensure all structural and statistical details are covered comprehensively.
 
  heatmap: |
    This crop shows a heatmap.
    Provide a detailed summary covering:
      - The title, subtitle, figure label, caption, and any source note if visible
      - What the rows and columns represent, including all visible labels and their ordering
      - What the color intensity represents, including the color scale, legend, range, and units
      - Numerical values printed within cells, if present
      - Any annotations, highlights, outlines, callouts, or explanatory text
      - Any cropped row names, truncated labels, partially visible legends, or readability issues
      - The main pattern, relationship, or insight conveyed by the heatmap
    Ensure all visible structural and value-based details are captured thoroughly.
    
  flowchart: |
    This crop shows a flowchart.
    Provide a detailed summary covering:
      - The title, subtitle, caption, figure label, and any explanatory note
      - The overall process, workflow, or decision system being represented
      - The start point, end point, and all intermediate steps
      - The text inside each box, node, or symbol, preserving wording as closely as possible
      - The different shapes used and any meaning implied by those shapes
      - The direction of arrows and connectors between nodes
      - All decision points, including branch conditions and the outcomes of each branch
      - Any loops, retries, returns, exception paths, or alternate routes
      - Parallel branches, merged branches, or multi-step sequences
      - The overall logic and operational meaning conveyed by the flowchart
    Describe every visible step, branch, and structural detail thoroughly.
 
  diagram: |
    This crop shows a diagram.
    Provide a detailed summary covering:
      - The title, subtitle, caption, figure label, and any descriptive note
      - What system, concept, structure, or process is being illustrated
      - All main components, entities, layers, or sections shown
      - How the components are arranged spatially or hierarchically
      - Any arrows, connectors, lines, or links and what they indicate
      - Direction of flow, dependency, containment, or interaction if visible
      - Labels, legends, numbered parts, symbols, or icons and their meaning
      - Color coding, boundaries, shaded regions, or visual grouping
      - Any annotations, callouts, explanatory text, or notes
      - The main relationship, mechanism, or idea conveyed by the diagram
    Ensure all visible structural and conceptual details are captured clearly.

  map: |
    This crop shows a map.
    Provide a detailed summary covering:
      - The title, subtitle, caption, figure label, and any geographic or time note
      - The geographic area shown, including regions, cities, countries, or landmarks if labeled
      - What is being mapped, such as routes, regions, markers, boundaries, or data overlays
      - The legend, color scale, symbols, line styles, and what each represents
      - Any labels for places, roads, rivers, zones, or borders
      - Areas of emphasis, high or low values, dense or sparse regions, or notable absences
      - Spatial patterns such as clusters, gradients, corridors, hotspots, or contrasts
      - Any routes, movement paths, arrows, start/end points, or directional indicators
      - Presence of scale bars, north arrows, inset maps, coordinate grids, or projection notes
      - The main geographic or spatial insight conveyed by the map
    Ensure all visible cartographic and data details are described thoroughly.

  photo: |
    This crop shows a photograph.
    Provide a detailed summary covering:
      - The main subject or subjects in the image
      - Their appearance, position, orientation, and any visible actions or interactions
      - The setting or environment, including indoor or outdoor context and background details
      - Foreground, middle-ground, and background elements
      - Any visible objects, tools, clothing, equipment, signs, screens, or documents
      - Facial expressions, posture, gestures, or body language if people are present
      - Lighting, weather, time-of-day cues, and overall visual atmosphere
      - Any text overlays, watermarks, captions, timestamps, labels, or annotations
      - Any blur, obstruction, cropping, or incomplete visibility
      - The likely role of the photo in the document, such as illustrative, evidential, or contextual
    Describe everything visible in the photograph as clearly and completely as possible.

  illustration: |
    This crop shows an illustration or graphic.
    Provide a detailed summary covering:
      - The title, caption, figure label, and any embedded text
      - What is depicted, including all major objects, symbols, people, or concepts
      - Any labels, callouts, arrows, numbering, legends, or explanatory notes
      - The visual style, such as technical drawing, infographic, schematic, conceptual graphic, or cartoon
      - How the elements are arranged and related to each other
      - Any directionality, sequencing, layering, hierarchy, or flow shown
      - Color coding, highlighting, emphasis, or visual grouping
      - Any annotations or extra explanatory elements
      - Any cropped, faint, or ambiguous parts
      - The main concept, explanation, or message conveyed by the illustration
    Ensure all visible structural and semantic details are captured clearly.

  plot: |
    This crop shows a plot.
    Provide a detailed summary covering:
      - The title, subtitle, caption, and figure label if present
      - The likely chart or plot type based on visible features
      - The x-axis and y-axis labels, units, scales, ranges, and tick formatting
      - What is being measured, compared, or related
      - The number of visible series, groups, or mark types and how they are distinguished
      - The main trend, pattern, clustering, spread, or variation visible in the plot
      - Any peaks, troughs, outliers, anomalies, transitions, or notable regions
      - Any legends, labels, annotations, reference lines, or uncertainty markers
      - Visual encodings such as color, shape, size, line style, fill, or transparency
      - The most likely takeaway or conclusion supported by the visual evidence
    Describe the figure in a detailed and interpretive manner.

  figure: |
    This crop shows a figure.
    Provide a detailed summary covering:
      - The apparent figure type, such as chart, diagram, map, photo, illustration, or composite figure
      - The title, subtitle, caption, figure label, source note, and panel labels if present
      - The subject, concept, data, or scene depicted
      - All visible subcomponents, panels, sections, or regions and how they are arranged
      - Any labels, legends, axes, annotations, symbols, callouts, or textual elements
      - Any visible relationships, comparisons, structures, flows, or patterns
      - Colors, highlights, boundaries, markers, overlays, and other visual encodings
      - Any cropped, blurred, overlapping, faint, or ambiguous elements
      - The key information, role, or insight the figure contributes to the document
    Ensure that no important visible detail is omitted.